server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---------- security headers ----------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Vite-built assets only need self + inline for module preload + data URIs
    # for the SVG favicon. Adjust if you add external CDNs.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self' data:; manifest-src 'self'; worker-src 'self'" always;

    server_tokens off;

    # ---------- caching ----------
    # Long, immutable cache for fingerprinted Vite assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker must always re-validate so PWA updates roll out.
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback — every unknown path serves index.html so the
    # client-side router (or no router at all) takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- compression ----------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ---------- limits ----------
    client_max_body_size 1m;
}
