services:
  client:
    build:
      context: ./solid-colour
      dockerfile: Dockerfile
    image: colour-fun-client:latest
    container_name: colour-fun-client
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
