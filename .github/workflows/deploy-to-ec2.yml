name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Application
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'EOF'

            # install git + node + nginx if missing
            sudo apt update -y
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt install -y git nodejs nginx

            # clone repo if not exists
            if [ ! -d ~/colour-fun ]; then
              git clone https://github.com/Adi-gitX/colour-fun.git ~/colour-fun
            fi

            cd ~/colour-fun
            git pull origin main

            cd solid-colour
            npm install
            npm run build

            sudo mkdir -p /var/www/colour-fun
            sudo rm -rf /var/www/colour-fun/dist
            sudo cp -r dist /var/www/colour-fun/

            sudo systemctl restart nginx || true

            echo "Deployment complete"

          EOF
