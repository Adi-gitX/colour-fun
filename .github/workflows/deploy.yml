name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Application
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd ~/colour-fun || exit 1
            git pull origin main

            cd solid-colour
            npm install
            npm run build

            sudo mkdir -p /var/www/colour-fun
            sudo rm -rf /var/www/colour-fun/dist
            sudo cp -r dist /var/www/colour-fun/

            sudo systemctl restart nginx || true
            echo "Deployment complete"
          EOF
